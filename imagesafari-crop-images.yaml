Name: Image Safari Agricultural Image Corpus
Description: >
  Image Safari is a diversity-driven agricultural image corpus of 6,081,555
  cleaned field photographs across 18 crops and nine countries: Tanzania,
  Côte d'Ivoire, Madagascar, Nigeria, Senegal, Kenya, Ghana, Uganda, and
  Malawi. A subset of 30,765 annotated images supports organ-level computer
  vision tasks.
Documentation: >
  Dataset documentation, metadata schemas, curation methods, and access
  instructions are available at
  https://github.com/CIAT-Artemis/imagesafari-artemis-crop-images/blob/main/docs/imagesafari.md.
Contact: https://github.com/CIAT-Artemis/imagesafari-artemis-crop-images/issues
ManagedBy: "[Alliance of Bioversity International and CIAT](https://alliancebioversityciat.org/)"
UpdateFrequency: New curated releases are published as they become available.
