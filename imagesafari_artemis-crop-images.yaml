Name: ImageSafari_Artemis Crop Image Collection
Description: >
  ImageSafari_Artemis is a unified agricultural image dataset comprising
  7,469,220 field photographs across two complementary collections. Artemis
  (1,387,665 images) is a structured phenotyping dataset pairing imagery with
  agronomic, genotypic, and environmental metadata across four crops and four
  countries. Image Safari (6,081,555 images) is a diversity-driven corpus
  spanning 18 crops and nine countries. A subset of 42,981 images includes
  organ-level annotations in standard and benchmark tracks.
Documentation: >
  Dataset documentation, metadata schemas, predefined splits, and access
  instructions are available at
  https://github.com/CIAT-Artemis/imagesafari-artemis-crop-images/blob/main/README.md.
  Dataset-specific documentation is provided in docs/artemis.md and
  docs/imagesafari.md.
Contact: https://github.com/CIAT-Artemis/imagesafari-artemis-crop-images/issues
ManagedBy: "[Alliance of Bioversity International and CIAT](https://alliancebioversityciat.org/)"
UpdateFrequency: New curated releases are published as they become available.
