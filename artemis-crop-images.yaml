Name: Artemis Phenotyping Dataset
Description: >
  Artemis is a structured phenotyping dataset that pairs imagery with detailed
  agronomic, genotypic, and environmental metadata across four crop species:
  common bean (Phaseolus vulgaris), cowpea (Vigna unguiculata), soybean
  (Glycine max), and sorghum (Sorghum bicolor), and three locations: Tanzania,
  Uganda, and Colombia. Imaging was performed under defined protocols that link
  each image to metadata collected in the field, supporting fine-grained tasks
  such as trait estimation, growth stage recognition, and disease quantification.
Documentation: >
  Dataset documentation, access instructions, metadata descriptions, and
  organization details are available at
  https://github.com/CIAT-Artemis/imagesafari_artemis-crop-images/blob/main/docs/artemis.md.
Contact: https://github.com/CIAT-Artemis/imagesafari_artemis-crop-images/issues
ManagedBy: "[Alliance of Bioversity International and CIAT](https://alliancebioversityciat.org/)"
UpdateFrequency: New curated releases are published as they become available.
