Name: Artemis Phenotyping Dataset
Description: >
  Artemis is a structured phenotyping dataset of 1,387,665 images pairing field
  photographs with agronomic, genotypic, and environmental metadata across four
  crop species: common bean (Phaseolus vulgaris), cowpea (Vigna unguiculata),
  soybean (Glycine max), and sorghum (Sorghum bicolor), and four locations:
  Tanzania, Uganda, Colombia, and the United States.
Documentation: >
  Dataset documentation, metadata schemas, and access instructions are available
  at https://github.com/CIAT-Artemis/imagesafari-artemis-crop-images/blob/main/docs/artemis.md.
Contact: https://github.com/CIAT-Artemis/imagesafari-artemis-crop-images/issues
ManagedBy: "[Alliance of Bioversity International and CIAT](https://alliancebioversityciat.org/)"
UpdateFrequency: New curated releases are published as they become available.
Collabs:
