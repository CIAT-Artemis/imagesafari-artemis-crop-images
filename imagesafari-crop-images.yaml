Name: Image Safari Agricultural Image Corpus
Description: >
  Image Safari is a diversity-driven agricultural image corpus assembled to
  capture variability across 18 crops across nine countries: Tanzania, Côte
  d'Ivoire, Madagascar, Nigeria, Senegal, Kenya, Ghana, Uganda, and Malawi.
  Multiple imaging devices and field conditions are represented, with particular
  emphasis on smallholder farming systems common in the Global South. The
  published collection contains 6,081,555 cleaned field photographs.
Documentation: >
  Dataset documentation, access instructions, metadata descriptions, curation
  methods, and known characteristics are available at
  https://github.com/CIAT-Artemis/imagesafari_artemis-crop-images/blob/main/docs/imagesafari.md.
Contact: https://github.com/CIAT-Artemis/imagesafari_artemis-crop-images/issues
ManagedBy: "[Alliance of Bioversity International and CIAT](https://alliancebioversityciat.org/)"
UpdateFrequency: New curated releases are published as they become available.
